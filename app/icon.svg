<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Deep dark background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0B1530"/>
    </linearGradient>

    <!-- Bolt: lavender → violet → cyan -->
    <linearGradient id="boltGrad" x1="9" y1="3" x2="23" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Soft glow behind the bolt -->
    <filter id="glow" x="-60%" y="-40%" width="220%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7.5" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7"
        fill="none" stroke="url(#boltGrad)" stroke-width="0.5" opacity="0.35"/>

  <!-- Glow halo layer -->
  <path d="M19 3L9 17H16L12 29L23 15H16Z"
        fill="#8B5CF6" opacity="0.55" filter="url(#glow)"/>

  <!-- Lightning bolt -->
  <path d="M19 3L9 17H16L12 29L23 15H16Z"
        fill="url(#boltGrad)"/>
</svg>
